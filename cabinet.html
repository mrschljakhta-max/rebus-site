<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REBUS Secure — Кабінет</title>
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon-64.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png" />
  <link rel="stylesheet" href="css/styles.css?v=cabinet-minimal-v1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
</head>
<body class="cabinet-clean-page">
  <main id="top" class="cabinet-clean">
    <img class="cabinet-clean-bg" src="assets/cabinet-bg.svg" alt="" aria-hidden="true" />

    <section class="cabinet-clean-hero" aria-label="REBUS">
      <video class="cabinet-clean-video" autoplay muted loop playsinline preload="auto" aria-hidden="true">
        <source src="assets/page-1-girl.mp4" type="video/mp4" />
      </video>
      <img class="hero-overlay" src="assets/hero-overlay.svg" alt="">
      <a href="#menu-block" class="hero-arrow">
        <img src="assets/arrow-down.svg" alt="down">
      </a>
    </section>
    <span id="menu-block" class="menu-block-anchor" aria-hidden="true"></span>

    <div class="menu-cards-area" aria-label="Меню сайту">
      <img class="menu-cards-base" src="assets/menu-cards-base.svg" alt="" aria-hidden="true" />

      <span class="menu-hover-layer hover-cabinet" aria-hidden="true"></span>
      <span class="menu-hover-layer hover-learning" aria-hidden="true"></span>
      <span class="menu-hover-layer hover-contacts" aria-hidden="true"></span>

      <svg class="menu-card-hotspots" viewBox="0 0 100 100" preserveAspectRatio="none" aria-label="Меню сайту">
        <a class="menu-hotspot hotspot-cabinet" href="user-cabinet.html" aria-label="Кабінет">
          <polygon points="38.75,7.94 56.89,7.94 41.51,90.00 23.36,90.00"></polygon>
        </a>
        <a class="menu-hotspot hotspot-learning" href="training.html" aria-label="Навчання">
          <polygon points="58.67,7.94 76.79,7.94 61.42,90.00 43.27,90.00"></polygon>
        </a>
        <a class="menu-hotspot hotspot-contacts" href="contacts.html" aria-label="Контакти">
          <polygon points="78.72,7.94 96.87,7.94 81.51,90.00 63.34,90.00"></polygon>
        </a>
      </svg>
    </div>

    <a class="rebus-download-icon" href="https://chromewebstore.google.com/detail/bnhfaamjhhkbkgpddnpaoadibkibojho?utm_source=item-share-cb" target="_blank" rel="noopener noreferrer" aria-label="Завантажити REBUS Secure">
      <img src="assets/cloud-download.svg" alt="" aria-hidden="true">
    </a>


    <a href="#download-block" class="menu-next-arrow" aria-label="Перейти до третього блоку">
      <img src="assets/arrow-down.svg" alt="" aria-hidden="true">
    </a>

<span id="download-block" class="download-block-anchor" aria-hidden="true"></span>
<button id="logoutBtn" class="cabinet-clean-logout" type="button">Вийти</button>
      <span id="learning" class="section-anchor-learning" aria-hidden="true"></span>
    <span id="support" class="section-anchor-support" aria-hidden="true"></span>
</main>

  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const A = window.rebusAuth;
      const ctx = await A.requireUser();
      if (!ctx) return;
      const aal = await A.getAal();
      if (aal !== 'aal2') { location.href = 'verify-2fa.html'; return; }

      A.$('logoutBtn')?.addEventListener('click', async () => {
        await A.supabase.auth.signOut();
        location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
