<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REBUS Secure — Кабінет</title>
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon-64.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png" />
  <link rel="stylesheet" href="css/styles.css?v=cabinet-minimal-v1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
</head>
<body class="cabinet-clean-page">
  <main id="top" class="cabinet-clean">
    <img class="cabinet-clean-bg" src="assets/cabinet-bg.svg" alt="" aria-hidden="true" />

    <section class="cabinet-clean-hero" aria-label="REBUS">
      <video class="cabinet-clean-video" autoplay muted loop playsinline preload="auto" aria-hidden="true">
        <source src="assets/page-1-girl.mp4" type="video/mp4" />
      </video>
      <img class="hero-overlay" src="assets/hero-overlay.svg" alt="">
      <a href="#menu-block" class="hero-arrow">
        <img src="assets/arrow.svg" alt="down">
      </a>
    </section>
    <span id="menu-block" class="menu-block-anchor" aria-hidden="true"></span>

    <div class="menu-cards-area" aria-label="Меню сайту">
      <img class="menu-cards-base" src="assets/menu-cards-base.svg" alt="" aria-hidden="true" />
      <a class="menu-card-zone zone-cabinet" href="#top" aria-label="Кабінет"></a>
      <a class="menu-card-zone zone-learning" href="#learning" aria-label="Навчання"></a>
      <a class="menu-card-zone zone-contacts" href="#support" aria-label="Контакти"></a>
    </div>
<button id="logoutBtn" class="cabinet-clean-logout" type="button">Вийти</button>
      <span id="learning" class="section-anchor-learning" aria-hidden="true"></span>
    <span id="support" class="section-anchor-support" aria-hidden="true"></span>
  </main>

  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const A = window.rebusAuth;
      const ctx = await A.requireUser();
      if (!ctx) return;
      const aal = await A.getAal();
      if (aal !== 'aal2') { location.href = 'verify-2fa.html'; return; }

      A.$('logoutBtn')?.addEventListener('click', async () => {
        await A.supabase.auth.signOut();
        location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
