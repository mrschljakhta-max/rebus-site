<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REBUS Secure — Навчання</title>
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon-64.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png" />
  <link rel="stylesheet" href="css/styles.css?v=training-v1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
</head>
<body class="rebus-training-page">
  <nav class="rebus-topnav">
    <a class="rebus-nav-logo" href="cabinet.html" aria-label="Повернутися на сторінку меню">
      <img src="assets/favicon.png" alt="REBUS">
    </a>

    <div class="rebus-nav-links">
      <a href="user-cabinet.html">Особистий кабінет</a>
      <a class="active" href="training.html">Навчання</a>
      <a href="contacts.html">Підтримка</a>
      <button id="logoutBtn" type="button">Вихід</button>
    </div>
  </nav>

  <main class="training-page-main">
    <img class="training-page-bg" src="assets/training-page-bg.png" alt="Інструкція REBUS" />

    <a class="training-arrow training-arrow-1" href="#training-decrypt" aria-label="Перейти до другого блоку">
      <img src="assets/arrow-down.svg" alt="" aria-hidden="true">
    </a>

    <a class="training-arrow training-arrow-2" href="#training-roles" aria-label="Перейти до третього блоку">
      <img src="assets/arrow-down.svg" alt="" aria-hidden="true">
    </a>

    <span id="training-decrypt" class="training-anchor training-anchor-decrypt" aria-hidden="true"></span>
    <span id="training-roles" class="training-anchor training-anchor-roles" aria-hidden="true"></span>
  </main>

  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const A = window.rebusAuth;
      const ctx = await A.requireUser();
      if (!ctx) return;

      const aal = await A.getAal();
      if (aal !== 'aal2') {
        location.href = 'verify-2fa.html';
        return;
      }

      A.$('logoutBtn')?.addEventListener('click', async () => {
        await A.supabase.auth.signOut();
        location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
