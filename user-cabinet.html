<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REBUS Secure — Особистий кабінет</title>
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon-64.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png" />
  <link rel="stylesheet" href="css/styles.css?v=user-cabinet-v1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
</head>
<body class="rebus-profile-page">
  <nav class="rebus-topnav">
    <a class="rebus-nav-logo" href="cabinet.html" aria-label="Повернутися на сторінку меню">
      <img src="assets/favicon.png" alt="REBUS">
    </a>

    <div class="rebus-nav-links">
      <a class="active" href="user-cabinet.html">Особистий кабінет</a>
      <a href="training.html">Навчання</a>
      <a href="contacts.html">Підтримка</a>
      <button id="logoutBtn" type="button">Вихід</button>
    </div>
  </nav>

  <main class="rebus-profile-main">
    <section class="profile-hero">
      <div class="profile-hero-image" aria-hidden="true">
        <img src="assets/user-cabinet-about.png" alt="">
      </div>

      <div class="profile-panel">
        <h1>Дані профілю</h1>

        <div class="profile-lines">
          <div class="profile-line">
            <span>Email</span>
            <strong id="profileEmail">—</strong>
          </div>
          <div class="profile-line">
            <span>Маркер</span>
            <strong id="profileMarker">—</strong>
          </div>
          <div class="profile-line">
            <span>Статус</span>
            <strong id="profileStatus">—</strong>
          </div>
          <div class="profile-line">
            <span>Остання синхронізація</span>
            <strong id="profileSync">—</strong>
          </div>
        </div>

        <button class="profile-log-jump" type="button" data-scroll="#activity-log">
          <span>Журнал дій</span>
          <img src="assets/arrow-down.svg" alt="" aria-hidden="true">
        </button>
      </div>
    </section>

    <section id="activity-log" class="profile-log-section">
      <div class="profile-log-heading">
        <div>
          <h2>Журнал дій</h2>
          <p>Історія операцій у системі REBUS</p>
        </div>
        <button class="log-refresh-btn" id="logRefreshBtn" type="button" title="Оновити журнал">Оновити</button>
      </div>

      <div class="profile-log-controls" aria-label="Фільтри журналу дій">
        <label class="log-search-field">
          <span>Пошук</span>
          <input id="logSearch" type="search" placeholder="Операція, об’єкт, контур або статус..." autocomplete="off">
        </label>

        <div class="log-date-group">
          <label>
            <span>Від</span>
            <input id="logDateFrom" type="date">
          </label>
          <label>
            <span>До</span>
            <input id="logDateTo" type="date">
          </label>
        </div>

        <label>
          <span>Статус</span>
          <select id="logStatusFilter">
            <option value="all">Усі статуси</option>
            <option value="success">success</option>
            <option value="error">error</option>
            <option value="warning">warning</option>
            <option value="info">info</option>
          </select>
        </label>

        <label>
          <span>Сортування</span>
          <select id="logSort">
            <option value="created_desc">Нові спочатку</option>
            <option value="created_asc">Старі спочатку</option>
            <option value="operation_asc">Операція А–Я</option>
            <option value="object_asc">Об’єкт А–Я</option>
            <option value="contour_asc">Контур А–Я</option>
          </select>
        </label>

        <button class="log-reset-btn" id="logResetBtn" type="button">Очистити фільтри</button>
      </div>

      <div class="profile-log-wrap">
        <table class="profile-log-table">
          <thead>
            <tr>
              <th>Час</th>
              <th>Операція</th>
              <th>Об’єкт</th>
              <th>Статус</th>
              <th>Контур</th>
            </tr>
          </thead>
          <tbody id="activityRows">
            <tr>
              <td colspan="5" class="log-empty">Завантаження журналу...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="profile-log-footer">
        <span id="logCount">Показано 0 записів</span>
      </div>
    </section>
  </main>

  <script>
    const state = {
      logs: [],
      filteredLogs: []
    };

    const OPERATION_LABELS = {
      login: 'Авторизація',
      logout: 'Вихід із системи',
      sync: 'Синхронізація профілю',
      encrypt: 'Шифрування файлу',
      decrypt: 'Розшифрування файлу',
      upload: 'Завантаження файлу',
      account_switch: 'Зміна акаунта',
      change_account: 'Зміна акаунта',
      profile_update: 'Оновлення профілю',
      key_rotation: 'Оновлення ключа',
      error: 'Помилка'
    };

    function escapeHtml(value) {
      return String(value ?? '—')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatDateTime(value) {
      if (!value) return '—';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString('uk-UA', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function normalizeStatus(status, isActive) {
      if (status === 'active' || isActive === true) return 'Активний';
      if (status === 'inactive' || isActive === false) return 'Неактивний';
      if (status === 'deleted') return 'Видалений';
      return status || '—';
    }

    function operationLabel(operation) {
      const key = String(operation || '').trim().toLowerCase();
      return OPERATION_LABELS[key] || operation || 'Операція';
    }

    function formatFileSize(bytes) {
      const value = Number(bytes || 0);
      if (!value) return '';
      if (value < 1024) return `${value} Б`;
      if (value < 1024 * 1024) return `${(value / 1024).toFixed(value < 10240 ? 1 : 0)} КБ`;
      return `${(value / 1024 / 1024).toFixed(value < 1024 * 10240 ? 1 : 0)} МБ`;
    }

    function contourValue(row) {
      if (Array.isArray(row.contour_names) && row.contour_names.length) return row.contour_names.join(', ');
      return row.contour_name || row.contour || row.metadata?.contour || '—';
    }

    function objectValue(row) {
      const name = row.object_name || row.file_name || row.metadata?.fileName || row.metadata?.file_name || '—';
      const size = row.file_size || row.metadata?.fileSize || row.metadata?.file_size;
      const formattedSize = formatFileSize(size);
      return formattedSize && name !== '—' ? `${name} (${formattedSize})` : name;
    }

    function statusClass(status) {
      const value = String(status || '').toLowerCase();
      if (value === 'success') return 'ok';
      if (value === 'error') return 'bad';
      if (value === 'warning') return 'warn';
      return 'neutral';
    }

    function getLogFilters() {
      return {
        search: (document.getElementById('logSearch')?.value || '').trim().toLowerCase(),
        from: document.getElementById('logDateFrom')?.value || '',
        to: document.getElementById('logDateTo')?.value || '',
        status: document.getElementById('logStatusFilter')?.value || 'all',
        sort: document.getElementById('logSort')?.value || 'created_desc'
      };
    }

    function rowDateOnly(row) {
      if (!row.created_at) return '';
      const date = new Date(row.created_at);
      if (Number.isNaN(date.getTime())) return '';
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const dd = String(date.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function applyLogFilters() {
      const filters = getLogFilters();
      let rows = [...state.logs];

      if (filters.search) {
        rows = rows.filter((row) => {
          const haystack = [
            operationLabel(row.operation),
            row.operation,
            objectValue(row),
            row.status,
            contourValue(row),
            row.user_email || row.email,
            row.error_message
          ].join(' ').toLowerCase();
          return haystack.includes(filters.search);
        });
      }

      if (filters.status !== 'all') {
        rows = rows.filter((row) => String(row.status || '').toLowerCase() === filters.status);
      }

      if (filters.from) rows = rows.filter((row) => rowDateOnly(row) >= filters.from);
      if (filters.to) rows = rows.filter((row) => rowDateOnly(row) <= filters.to);

      rows.sort((a, b) => {
        if (filters.sort === 'created_asc') return new Date(a.created_at || 0) - new Date(b.created_at || 0);
        if (filters.sort === 'operation_asc') return operationLabel(a.operation).localeCompare(operationLabel(b.operation), 'uk');
        if (filters.sort === 'object_asc') return objectValue(a).localeCompare(objectValue(b), 'uk');
        if (filters.sort === 'contour_asc') return contourValue(a).localeCompare(contourValue(b), 'uk');
        return new Date(b.created_at || 0) - new Date(a.created_at || 0);
      });

      state.filteredLogs = rows;
      renderLogs(rows);
    }

    function renderLogs(rows) {
      const body = document.getElementById('activityRows');
      const count = document.getElementById('logCount');
      if (!body) return;

      if (count) {
        const total = state.logs.length;
        count.textContent = `Показано ${rows?.length || 0} із ${total} записів`;
      }

      if (!rows || !rows.length) {
        body.innerHTML = '<tr><td colspan="5" class="log-empty">Записів за вибраними умовами немає.</td></tr>';
        return;
      }

      body.innerHTML = rows.map((row) => {
        const status = row.status || 'info';
        const object = objectValue(row);
        const contour = contourValue(row);
        const errorMessage = row.error_message ? `<small class="log-error-text">${escapeHtml(row.error_message)}</small>` : '';
        return `
          <tr>
            <td>${escapeHtml(formatDateTime(row.created_at))}</td>
            <td>${escapeHtml(operationLabel(row.operation))}</td>
            <td><span class="log-object">${escapeHtml(object)}</span>${errorMessage}</td>
            <td><span class="log-status ${statusClass(status)}">${escapeHtml(status)}</span></td>
            <td>${escapeHtml(contour)}</td>
          </tr>
        `;
      }).join('');
    }

    async function loadActionLogs(A) {
      const refreshBtn = document.getElementById('logRefreshBtn');
      if (refreshBtn) refreshBtn.disabled = true;

      try {
        const { data, error } = await A.supabase
          .from('action_logs')
          .select('id, user_id, email, user_email, user_name, user_role, operation, object_name, object_type, file_name, file_size, status, contour, contour_name, contour_names, duration_ms, error_message, metadata, created_at')
          .order('created_at', { ascending: false })
          .limit(300);

        if (error) throw error;
        state.logs = data || [];
        applyLogFilters();
      } catch (error) {
        console.warn('[REBUS] action log error:', error?.message || error);
        state.logs = [];
        renderLogs([]);
      } finally {
        if (refreshBtn) refreshBtn.disabled = false;
      }
    }

    window.addEventListener('DOMContentLoaded', async () => {
      document.querySelector('[data-scroll]')?.addEventListener('click', (event) => {
        const target = document.querySelector(event.currentTarget.dataset.scroll);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      const A = window.rebusAuth;
      const ctx = await A.requireUser();
      if (!ctx) return;

      const aal = await A.getAal();
      if (aal !== 'aal2') {
        location.href = 'verify-2fa.html';
        return;
      }

      const user = ctx.session.user;
      const profile = ctx.profile || {};
      const email = profile.email || user.email || '—';
      const marker = profile.marker || profile.access_marker || '—';

      A.$('profileEmail').textContent = email;
      A.$('profileMarker').textContent = marker;
      A.$('profileStatus').textContent = normalizeStatus(profile.status, profile.is_active);
      A.$('profileSync').textContent = formatDateTime(profile.updated_at || profile.last_login || profile.created_at);

      A.$('logoutBtn')?.addEventListener('click', async () => {
        await A.supabase.auth.signOut();
        location.href = 'index.html';
      });

      ['logSearch', 'logDateFrom', 'logDateTo', 'logStatusFilter', 'logSort'].forEach((id) => {
        document.getElementById(id)?.addEventListener('input', applyLogFilters);
        document.getElementById(id)?.addEventListener('change', applyLogFilters);
      });

      document.getElementById('logResetBtn')?.addEventListener('click', () => {
        ['logSearch', 'logDateFrom', 'logDateTo'].forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.value = '';
        });
        const status = document.getElementById('logStatusFilter');
        const sort = document.getElementById('logSort');
        if (status) status.value = 'all';
        if (sort) sort.value = 'created_desc';
        applyLogFilters();
      });

      document.getElementById('logRefreshBtn')?.addEventListener('click', () => loadActionLogs(A));

      await loadActionLogs(A);
    });
  </script>
</body>
</html>
