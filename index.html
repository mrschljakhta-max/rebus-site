<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REBUS Secure — Вхід</title>
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon-64.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png" />
  <link rel="icon" type="image/png" href="assets/favicon-dark.png" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/png" href="assets/favicon-light.png" media="(prefers-color-scheme: light)" />
  <link rel="stylesheet" href="css/styles.css?v=login-center-v3" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
</head>
<body class="page-bg login-bg login-video-page">
  <video class="login-bg-video" autoplay muted loop playsinline preload="auto" aria-hidden="true">
    <source src="assets/video-enter-site.mp4" type="video/mp4" />
  </video>
  <main class="login-entry" aria-label="REBUS Secure login">
    <button id="loginBtn" class="login-word" type="button" aria-label="Увійти через Google"><span class="login-word-text">ВХІД</span></button>
  </main>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const { $, startGoogleLogin, routeIfAlreadyLoggedIn } = window.rebusAuth;
      $('loginBtn')?.addEventListener('click', startGoogleLogin);
      await routeIfAlreadyLoggedIn();
    });
  </script>
</body>
</html>
